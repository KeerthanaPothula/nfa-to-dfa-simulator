
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c:#00f5ff;--p:#b84fff;--g:#39ff14;--a:#ffaa00;--r:#ff3366;--pk:#ff0099;
  --bg:#060a14;--bg2:#0b1120;--bg3:#111827;--bd:rgba(0,245,255,0.13);
  --tx:#c0d4f0;--mt:#4a6080;
  --mono:'Share Tech Mono',monospace;--body:'Rajdhani',sans-serif
}
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--tx);font-family:var(--body)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(0,245,255,0.04) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(184,79,255,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
#wrap{width:100%;max-width:1400px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;padding:20px;position:relative;z-index:1}
#hdr{background:rgba(11,17,32,0.95);border:1px solid var(--bd);border-radius:12px;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;backdrop-filter:blur(10px)}
#hdr h1{font-family:var(--mono);font-size:15px;font-weight:400;color:var(--c);letter-spacing:3px;text-transform:uppercase;text-shadow:0 0 20px rgba(0,245,255,0.5)}
#hdr-right{display:flex;align-items:center;gap:14px}
.badge{background:rgba(0,245,255,0.07);border:1px solid rgba(0,245,255,0.22);color:var(--c);font-size:9px;padding:3px 10px;border-radius:20px;letter-spacing:2px;font-family:var(--mono)}
.mode-pills{display:flex;gap:3px}
.pill{font-size:11px;padding:4px 12px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:all .2s;font-family:var(--body);font-weight:500;color:var(--mt);letter-spacing:.5px}
.pill.on{background:rgba(0,245,255,0.1);border-color:rgba(0,245,255,0.35);color:var(--c)}
#app{flex:1;display:flex;flex-direction:column;gap:14px}
#canvases{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cpanel{position:relative;height:340px;background:rgba(11,17,32,0.9);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.ptitle{position:absolute;top:10px;left:14px;font-size:9px;font-weight:400;letter-spacing:2.5px;text-transform:uppercase;z-index:2;font-family:var(--mono)}
.nfa-c{color:var(--c);text-shadow:0 0 10px rgba(0,245,255,0.5)}
.dfa-c{color:var(--p);text-shadow:0 0 10px rgba(184,79,255,0.5)}
.scan-line{position:absolute;bottom:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--c),transparent);animation:scan 3s linear infinite;opacity:.15;pointer-events:none;z-index:3}
.scan-line.p{background:linear-gradient(90deg,transparent,var(--p),transparent);animation-delay:-1.5s}
@keyframes scan{0%{bottom:0}100%{bottom:100%}}
canvas{display:block;width:100%;height:100%}
.fwc{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
#bottom{display:grid;grid-template-columns:1fr 1fr;gap:14px}
#ctrl{background:rgba(11,17,32,0.9);border:1px solid var(--bd);border-radius:12px;padding:18px 20px;position:relative}
#logp{background:rgba(11,17,32,0.9);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;overflow-y:auto;max-height:280px}
.cg{margin-bottom:14px}
.cl{font-size:9px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;font-family:var(--mono);display:flex;align-items:center;gap:6px}
.cl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.05)}
.br{display:flex;gap:6px;flex-wrap:wrap}
.b{background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.18);color:var(--c);font-size:11px;padding:6px 13px;border-radius:6px;cursor:pointer;transition:all .2s;font-family:var(--body);font-weight:500;letter-spacing:.5px}
.b:hover{background:rgba(0,245,255,0.12);border-color:rgba(0,245,255,0.5);box-shadow:0 0 12px rgba(0,245,255,0.15)}
.b.on{background:rgba(0,245,255,0.15);border-color:var(--c);color:#fff;box-shadow:0 0 14px rgba(0,245,255,0.2)}
.bp{border-color:rgba(184,79,255,0.25);color:var(--p)}
.bp:hover{background:rgba(184,79,255,0.1);border-color:rgba(184,79,255,0.6);box-shadow:0 0 12px rgba(184,79,255,0.15)}
.bd2{border-color:rgba(255,51,102,0.25);color:var(--r)}
.bd2:hover{background:rgba(255,51,102,0.07);border-color:rgba(255,51,102,0.5)}
.bg2{border-color:rgba(57,255,20,0.25);color:var(--g)}
.bg2:hover{background:rgba(57,255,20,0.07);border-color:rgba(57,255,20,0.5);box-shadow:0 0 12px rgba(57,255,20,0.1)}
.sr{display:flex;align-items:center;gap:8px;margin-top:4px}
.sr input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:rgba(0,245,255,0.15);border-radius:2px;outline:none}
.sr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--c);cursor:pointer;box-shadow:0 0 8px rgba(0,245,255,0.5)}
.sc{font-size:11px;color:var(--c);min-width:24px;font-family:var(--mono)}
.stc{font-size:10px;color:var(--mt);margin-top:8px;font-family:var(--mono)}
.stc span{color:var(--c)}
.lt{font-size:9px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-family:var(--mono);display:flex;align-items:center;gap:6px}
.lt::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.05)}
.le{padding:4px 8px;border-left:2px solid transparent;margin-bottom:4px;border-radius:0 4px 4px 0;line-height:1.55;font-family:var(--body);font-size:12px}
.li{border-color:var(--c);background:rgba(0,245,255,0.03);color:rgba(0,245,255,0.72)}
.la{border-color:var(--a);background:rgba(255,170,0,0.03);color:var(--a)}
.lr{border-color:var(--g);background:rgba(57,255,20,0.03);color:rgba(57,255,20,0.82)}
.lw{border-color:var(--p);background:rgba(184,79,255,0.03);color:var(--p)}
.eb{display:flex;gap:5px;flex-wrap:wrap}
.exb{font-size:11px;padding:5px 11px;border-radius:5px;cursor:pointer;background:rgba(184,79,255,0.06);border:1px solid rgba(184,79,255,0.2);color:var(--p);transition:all .2s;font-family:var(--body);font-weight:500}
.exb:hover{background:rgba(184,79,255,0.15);border-color:rgba(184,79,255,0.5)}
#hint{margin-top:10px;padding:8px 10px;background:rgba(0,245,255,0.03);border-left:2px solid rgba(0,245,255,0.35);border-radius:0 5px 5px 0;font-size:11px;color:rgba(0,245,255,0.65);line-height:1.6;min-height:32px;font-family:var(--body)}
#toast{position:fixed;top:24px;right:24px;background:rgba(6,10,20,0.97);border:1px solid var(--g);color:var(--g);padding:10px 18px;border-radius:8px;font-size:12px;z-index:9999;font-family:var(--mono);transform:translateY(-80px);transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;letter-spacing:.5px;box-shadow:0 0 20px rgba(57,255,20,0.2)}
#toast.show{transform:translateY(0)}
#legend{display:flex;gap:18px;align-items:center;background:rgba(11,17,32,0.9);border:1px solid var(--bd);border-radius:10px;padding:10px 18px;font-size:10px;color:var(--mt);font-family:var(--mono)}
.leg{display:flex;align-items:center;gap:6px}
.leg-dot{width:10px;height:10px;border-radius:50%}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,245,255,0.2);border-radius:2px}
</style>
</head>
<body>
<div id="toast"><span id="tmsg"></span></div>
<div id="wrap">
  <div id="hdr">
    <h1>⬡ NFA → DFA Converter</h1>
    <div id="hdr-right">
      <span class="badge">AUTOMATA LAB v2.1</span>
      <div class="mode-pills">
        <span class="pill on" onclick="setMode('beginner')">Beginner</span>
        <span class="pill" onclick="setMode('advanced')">Advanced</span>
      </div>
    </div>
  </div>
  <div id="app">
    <div id="canvases">
      <div class="cpanel" id="np">
        <span class="ptitle nfa-c">NFA — Non-deterministic</span>
        <div class="scan-line"></div>
        <canvas id="nc"></canvas>
        <canvas class="fwc" id="fn"></canvas>
      </div>
      <div class="cpanel" id="dp">
        <span class="ptitle dfa-c">DFA — Deterministic</span>
        <div class="scan-line p"></div>
        <canvas id="dc"></canvas>
        <canvas class="fwc" id="fd"></canvas>
      </div>
    </div>
    <div id="bottom">
      <div id="ctrl">
        <div class="cg">
          <div class="cl">Examples</div>
          <div class="eb">
            <button class="exb" onclick="loadEx(0)">ε-NFA</button>
            <button class="exb" onclick="loadEx(1)">Branching</button>
            <button class="exb" onclick="loadEx(2)">Ends in ab</button>
            <button class="exb" onclick="loadEx(3)">Star (a*)</button>
          </div>
        </div>
        <div class="cg">
          <div class="cl">Playback</div>
          <div class="br">
            <button class="b" onclick="sBack()">⏮ Back</button>
            <button class="b on" id="pbtn" onclick="togPlay()">▶ Play</button>
            <button class="b" onclick="sFwd()">⏭ Step</button>
            <button class="b bd2" onclick="doReset()">↺ Reset</button>
            <button class="b bg2" onclick="runAll()">⚡ Convert all</button>
          </div>
        </div>
        <div class="cg">
          <div class="cl">Speed</div>
          <div class="sr">
            <span style="font-size:10px;color:var(--mt)">Slow</span>
            <input type="range" id="spd" min="1" max="5" value="3" step="1" oninput="setSpd(this.value)">
            <span style="font-size:10px;color:var(--mt)">Fast</span>
            <span class="sc" id="sval">3x</span>
          </div>
        </div>
        <div class="cg">
          <div class="cl">Options</div>
          <div class="br">
            <button class="b bp" id="epsbtn" onclick="togEps()">ε-closure ON</button>
          </div>
        </div>
        <div class="stc">Step <span id="snum">0</span> / <span id="stot">0</span></div>
        <div id="hint">Select an example above, then press ▶ Play to begin.</div>
      </div>
      <div id="logp">
        <div class="lt">Conversion log</div>
        <div id="loge"></div>
      </div>
    </div>
    <div id="legend">
      <span style="font-size:9px;letter-spacing:1px">LEGEND:</span>
      <span class="leg"><span class="leg-dot" style="background:var(--c);box-shadow:0 0 6px var(--c)"></span>Active state</span>
      <span class="leg"><span class="leg-dot" style="background:var(--g);box-shadow:0 0 6px var(--g)"></span>Accepting state</span>
      <span class="leg"><span class="leg-dot" style="background:var(--p);box-shadow:0 0 6px var(--p)"></span>Regular state</span>
      <span class="leg"><span style="color:var(--pk);font-size:12px;font-family:var(--mono)">ε</span> Epsilon transition</span>
    </div>
  </div>
</div>

<script>
const NC=document.getElementById('nc'),DC=document.getElementById('dc');
const FC=document.getElementById('fn'),FD=document.getElementById('fd');
const Nc=NC.getContext('2d'),Dc=DC.getContext('2d');
const Fc=FC.getContext('2d'),Fd=FD.getContext('2d');

let NW,NH,DW,DH;
function resize(){
  const np=document.getElementById('np'),dp=document.getElementById('dp');
  NW=np.offsetWidth; NH=np.offsetHeight;
  DW=dp.offsetWidth; DH=dp.offsetHeight;
  [NC,FC].forEach(c=>{c.width=NW;c.height=NH});
  [DC,FD].forEach(c=>{c.width=DW;c.height=DH});
  render();
}

let mode='beginner',showEps=true,playing=false,spdMs=800,timer=null;
let cur=0,steps=[],nfa=null,dfaS=[],dfaT=[];
let hlN=new Set(),hlD=new Set(),animT=0;

const HINTS=[
  'ε-closure: all states reachable via empty (ε) transitions from a given state',
  'Subset construction: each DFA state equals a SET of NFA states',
  'Start the DFA from the ε-closure of the NFA start state',
  'For each input symbol, find all reachable NFA states',
  'A DFA state is accepting if ANY NFA state inside it is accepting',
  'Repeat until no new DFA states are discovered',
  'Conversion complete — every DFA state is now fully deterministic',
];

const EX=[
  {name:'ε-NFA',states:['q0','q1','q2'],alpha:['a','b'],start:'q0',accept:['q2'],
   trans:{q0:{e:['q1'],a:['q0']},q1:{b:['q1'],e:['q2']},q2:{a:['q2']}},
   pos:{q0:[.15,.5],q1:[.5,.5],q2:[.85,.5]}},
  {name:'Branching',states:['q0','q1','q2','q3'],alpha:['a','b'],start:'q0',accept:['q2','q3'],
   trans:{q0:{a:['q1','q2'],b:['q3']},q1:{b:['q2']},q2:{},q3:{a:['q3']}},
   pos:{q0:[.15,.5],q1:[.45,.25],q2:[.78,.25],q3:[.6,.78]}},
  {name:'Ends in ab',states:['q0','q1','q2'],alpha:['a','b'],start:'q0',accept:['q2'],
   trans:{q0:{a:['q0','q1'],b:['q0']},q1:{b:['q2']},q2:{}},
   pos:{q0:[.15,.5],q1:[.5,.5],q2:[.85,.5]}},
  {name:'Star (a*)',states:['q0','q1'],alpha:['a'],start:'q0',accept:['q0'],
   trans:{q0:{a:['q1'],e:['q1']},q1:{e:['q0']}},
   pos:{q0:[.3,.5],q1:[.7,.5]}},
];

function epsClosure(sts,tr){
  const c=new Set(sts),st=[...sts];
  while(st.length){const s=st.pop();((tr[s]&&tr[s].e)||[]).forEach(t=>{if(!c.has(t)){c.add(t);st.push(t);}});}
  return [...c].sort();
}
function moveFn(sts,sym,tr){
  const r=new Set();
  sts.forEach(s=>{((tr[s]&&tr[s][sym])||[]).forEach(t=>r.add(t));});
  return [...r].sort();
}

function buildSteps(){
  steps=[];dfaS=[];dfaT=[];cur=0;
  if(!nfa)return;
  const sc=epsClosure([nfa.start],nfa.trans),sl='{'+sc.join(',')+'}';
  dfaS.push({id:sl,ns:sc,isStart:true,isAccept:sc.some(s=>nfa.accept.includes(s)),pos:null});
  steps.push({type:'eps',nH:new Set([nfa.start]),dH:new Set([sl]),
    msg:'ε-closure('+nfa.start+') = {'+sc.join(', ')+'}',hi:0});
  const q=[dfaS[0]],vis=new Set([sl]);
  while(q.length){
    const cur2=q.shift();
    nfa.alpha.forEach(sym=>{
      const mv=moveFn(cur2.ns,sym,nfa.trans);if(!mv.length)return;
      const cl=epsClosure(mv,nfa.trans),lb='{'+cl.join(',')+'}';
      steps.push({type:'move',nH:new Set(cur2.ns),sym,mv,cl,dfrom:cur2.id,dto:lb,
        dH:new Set([cur2.id,lb]),
        msg:'From '+cur2.id+' on \''+sym+'\': move={'+mv.join(',')+'}, ε-closure={'+cl.join(',')+'}',
        hi:Math.min(steps.length,5)});
      if(!vis.has(lb)){
        vis.add(lb);
        const ns2={id:lb,ns:cl,isStart:false,isAccept:cl.some(s=>nfa.accept.includes(s)),pos:null};
        dfaS.push(ns2);q.push(ns2);
        steps.push({type:'new',dH:new Set([lb]),
          msg:'New DFA state: '+lb+(ns2.isAccept?' ★ (accepting)':''),hi:4});
      }
      if(!dfaT.find(t=>t.from===cur2.id&&t.sym===sym))dfaT.push({from:cur2.id,to:lb,sym});
    });
  }
  steps.push({type:'done',dH:new Set(dfaS.map(s=>s.id)),
    msg:'Done! DFA has '+dfaS.length+' state'+(dfaS.length>1?'s':'')+' — conversion complete.',hi:6});
  layoutDFA();
  document.getElementById('stot').textContent=steps.length;
}

function layoutDFA(){
  const n=dfaS.length;if(!n)return;
  if(n===1){dfaS[0].pos=[.5,.5];return;}
  // Use elliptical layout with more vertical space for better label clarity
  dfaS.forEach((s,i)=>{
    const a=(2*Math.PI*i/n)-Math.PI/2;
    const rx = n<=3 ? 0.33 : n<=5 ? 0.36 : 0.38;
    const ry = n<=3 ? 0.3  : n<=5 ? 0.32 : 0.34;
    s.pos=[0.5+rx*Math.cos(a), 0.5+ry*Math.sin(a)];
  });
}

function applyStep(i){
  if(i<0||i>=steps.length)return;
  cur=i;const s=steps[i];
  hlN=s.nH||new Set();hlD=s.dH||new Set();
  document.getElementById('snum').textContent=i+1;
  if(mode==='beginner'&&s.hi!==undefined)document.getElementById('hint').textContent=HINTS[s.hi]||'';
  addLog(s.msg,s.type==='done'||s.type==='new'?'r':s.type==='eps'?'w':'a');
  render();
}

function addLog(msg,t){
  t=t||'i';
  const el=document.getElementById('loge'),d=document.createElement('div');
  d.className='le l'+t;d.textContent=msg;el.prepend(d);
  if(el.children.length>25)el.removeChild(el.lastChild);
}

const R=26;

function drawNode(ctx,x,y,lbl,isStart,isAcc,hl,sm){
  const r=sm?18:R;
  const pulse=hl?(0.65+0.35*Math.sin(animT*.07)):1;
  const col=hl?'rgba(0,245,255,'+(.8+.2*pulse)+')':isAcc?'rgba(57,255,20,0.9)':'rgba(184,79,255,0.85)';
  const glow=hl?'#00f5ff':isAcc?'#39ff14':'#b84fff';
  ctx.save();
  ctx.shadowColor=glow;ctx.shadowBlur=hl?24*pulse:12;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=hl?'rgba(0,245,255,0.09)':isAcc?'rgba(57,255,20,0.07)':'rgba(184,79,255,0.07)';
  ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=hl?2.2:1.5;ctx.stroke();
  if(isAcc){
    ctx.beginPath();ctx.arc(x,y,r-5,0,Math.PI*2);
    ctx.lineWidth=1;ctx.stroke();
  }
  if(isStart){
    ctx.strokeStyle='rgba(0,245,255,0.75)';ctx.lineWidth=1.5;
    ctx.shadowColor='#00f5ff';ctx.shadowBlur=10;
    ctx.beginPath();ctx.moveTo(x-r-22,y);ctx.lineTo(x-r-2,y);
    ctx.moveTo(x-r-10,y-6);ctx.lineTo(x-r-2,y);ctx.lineTo(x-r-10,y+6);
    ctx.stroke();
  }
  ctx.restore();
  // Label — clip long DFA set labels
  ctx.save();
  ctx.fillStyle='rgba(210,230,255,0.92)';
  const fs = sm ? 8 : 10;
  ctx.font=`bold ${fs}px Share Tech Mono,monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  // For DFA states with long set labels, try to shorten
  let drawLbl = lbl;
  if(lbl.length > 10) {
    // Show truncated inside node, full label below
    drawLbl = lbl.slice(0,8)+'…';
  }
  ctx.fillText(drawLbl,x,y);
  ctx.restore();

  // If DFA state label is long, show full label below node
  if(lbl.length > 6 && sm) {
    ctx.save();
    ctx.fillStyle='rgba(184,79,255,0.8)';
    ctx.font='7px Share Tech Mono,monospace';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(lbl,x,y+r+4);
    ctx.restore();
  }
}

// Improved arrow drawing with proper offset for parallel edges
function getEdgePoints(x1,y1,x2,y2,r,offset){
  const dx=x2-x1,dy=y2-y1,d=Math.sqrt(dx*dx+dy*dy);
  if(d<1)return null;
  const ux=dx/d,uy=dy/d;
  // Perpendicular offset to separate parallel edges
  const px=-uy*offset,py=ux*offset;
  return {
    sx:x1+ux*r+px, sy:y1+uy*r+py,
    ex:x2-ux*r+px, ey:y2-uy*r+py,
    mx:(x1+x2)/2+px, my:(y1+y2)/2+py,
    ux,uy,px,py,d
  };
}

function arrowHead(ctx,x,y,angle,col){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-9,-4);ctx.lineTo(-9,4);ctx.closePath();
  ctx.fillStyle=col;ctx.fill();ctx.restore();
}

// Draw a self-loop above the node
function drawSelfLoop(ctx,x,y,lbl,col,r){
  const loopR=14;
  const topY=y-r;
  // Draw arc above node
  ctx.save();
  ctx.strokeStyle=col;ctx.lineWidth=1.3;
  ctx.shadowColor=col;ctx.shadowBlur=6;
  ctx.beginPath();
  ctx.arc(x,topY-loopR+2,loopR,0.45*Math.PI,2.55*Math.PI,false);
  ctx.stroke();
  // Arrowhead at bottom-right of arc
  const endAngle=2.55*Math.PI;
  const ax=x+loopR*Math.cos(endAngle);
  const ay=(topY-loopR+2)+loopR*Math.sin(endAngle);
  arrowHead(ctx,ax,ay,endAngle+Math.PI/2,col);
  // Label above the loop
  if(lbl){
    ctx.fillStyle=col;
    ctx.font='10px Share Tech Mono,monospace';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.shadowBlur=0;
    ctx.fillText(lbl,x,topY-loopR*2-2);
  }
  ctx.restore();
}

// Draw straight or curved arrow with a proper label offset
function drawArrow(ctx,x1,y1,x2,y2,lbl,col,curved,self,nodeR){
  if(!nodeR)nodeR=R;
  if(self){drawSelfLoop(ctx,x1,y1,lbl,col,nodeR);return;}
  const dx=x2-x1,dy=y2-y1,d=Math.sqrt(dx*dx+dy*dy);
  if(d<2)return;
  const ux=dx/d,uy=dy/d;
  ctx.save();
  ctx.strokeStyle=col;ctx.lineWidth=1.3;
  ctx.shadowColor=col;ctx.shadowBlur=5;
  ctx.fillStyle=col;

  if(curved){
    // Curved arc offset perpendicular so both directions are visible
    const sx=x1+ux*nodeR,sy=y1+uy*nodeR;
    const ex=x2-ux*nodeR,ey=y2-uy*nodeR;
    // Control point offset by 36px perpendicular
    const cpx=(sx+ex)/2 - uy*38;
    const cpy=(sy+ey)/2 + ux*38;
    ctx.beginPath();ctx.moveTo(sx,sy);
    ctx.quadraticCurveTo(cpx,cpy,ex,ey);
    ctx.stroke();
    // Arrow angle at end
    const t=0.97;
    const qx=2*(1-t)*(cpx-sx)+2*t*(ex-cpx);
    const qy=2*(1-t)*(cpy-sy)+2*t*(ey-cpy);
    arrowHead(ctx,ex,ey,Math.atan2(ey-qy,ex-qx),col);
    // Label at midpoint of curve, offset outward
    if(lbl){
      const mlx=(1-0.5)*(1-0.5)*sx+2*(1-0.5)*0.5*cpx+0.5*0.5*ex;
      const mly=(1-0.5)*(1-0.5)*sy+2*(1-0.5)*0.5*cpy+0.5*0.5*ey;
      const nm=Math.sqrt((cpx-(sx+ex)/2)**2+(cpy-(sy+ey)/2)**2)||1;
      const offx=(cpx-(sx+ex)/2)/nm*16;
      const offy=(cpy-(sy+ey)/2)/nm*16;
      ctx.shadowBlur=0;
      ctx.font='10px Share Tech Mono,monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(lbl,mlx+offx,mly+offy);
    }
  } else {
    // Straight arrow — slight offset sideways to avoid overlapping with reverse edge
    const offAmt = curved ? 0 : 0;
    const sx=x1+ux*nodeR,sy=y1+uy*nodeR;
    const ex=x2-ux*nodeR,ey=y2-uy*nodeR;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
    arrowHead(ctx,ex,ey,Math.atan2(ey-sy,ex-sx),col);
    if(lbl){
      // Place label perpendicular to the edge, offset away from midpoint
      const mx=(sx+ex)/2,my=(sy+ey)/2;
      // offset label slightly to one side
      const labOffX=-uy*14,labOffY=ux*14;
      ctx.shadowBlur=0;
      ctx.font='10px Share Tech Mono,monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      // Background pill for label
      const tw=ctx.measureText(lbl).width+6;
      ctx.fillStyle='rgba(6,10,20,0.75)';
      ctx.fillRect(mx+labOffX-tw/2,my+labOffY-8,tw,16);
      ctx.fillStyle=col;
      ctx.fillText(lbl,mx+labOffX,my+labOffY);
    }
  }
  ctx.restore();
}

// Collect all transitions between same pair for smart routing
function buildEdgeMap(states,trans){
  const map={};
  states.forEach(s=>{
    const tr=trans[s]||{};
    Object.entries(tr).forEach(([sym,tgts])=>{
      tgts.forEach(t=>{
        const key=s+'|'+t;
        if(!map[key])map[key]={syms:[],s,t};
        map[key].syms.push(sym);
      });
    });
  });
  return map;
}

function drawNFA(){
  Nc.clearRect(0,0,NW,NH);
  if(!nfa){
    Nc.fillStyle='rgba(0,245,255,0.2)';Nc.font='13px Share Tech Mono,monospace';Nc.textAlign='center';
    Nc.fillText('Select an example to begin',NW/2,NH/2);return;
  }
  const pos={};
  nfa.states.forEach(s=>{const p=nfa.pos[s];pos[s]=[p[0]*NW,p[1]*NH];});

  // Build edge map to group symbols on same edge
  const edgeMap=buildEdgeMap(nfa.states,nfa.trans);

  Object.entries(edgeMap).forEach(([key,info])=>{
    const {syms,s,t}=info;
    const p1=pos[s],p2=pos[t];
    if(!p1||!p2)return;
    const x1=p1[0],y1=p1[1],x2=p2[0],y2=p2[1];
    const hl=hlN.has(s)&&hlN.has(t);
    const hasEps=syms.includes('e');
    const col=hl?'#00f5ff':hasEps?'rgba(255,0,153,0.8)':'rgba(74,100,128,0.75)';
    const label=syms.map(sy=>sy==='e'?'ε':sy).join(',');
    const isSelf=s===t;
    // Check if there's a reverse edge too
    const reverseKey=t+'|'+s;
    const hasBoth=!isSelf&&!!edgeMap[reverseKey];
    drawArrow(Nc,x1,y1,x2,y2,label,col,hasBoth,isSelf,R);
  });

  nfa.states.forEach(s=>{
    const p=pos[s];if(!p)return;
    drawNode(Nc,p[0],p[1],s,s===nfa.start,nfa.accept.includes(s),hlN.has(s),false);
  });
}

function drawDFA(){
  Dc.clearRect(0,0,DW,DH);
  if(!dfaS.length){
    Dc.fillStyle='rgba(184,79,255,0.2)';Dc.font='13px Share Tech Mono,monospace';Dc.textAlign='center';
    Dc.fillText('DFA will appear here',DW/2,DH/2);return;
  }
  const vis=dfaS.filter(s=>{
    const idx=steps.findIndex(st=>st.type==='new'&&st.dH.has(s.id));
    return idx===-1||idx<=cur;
  });
  const pos={};
  vis.forEach(s=>{pos[s.id]=[s.pos[0]*DW,s.pos[1]*DH];});

  const visT=dfaT.filter(t=>{
    const fi=steps.findIndex(st=>(st.type==='move'||st.type==='done')&&st.dfrom===t.from&&st.dto===t.to);
    return fi!==-1&&fi<=cur;
  });

  // Group transitions by from+to pair
  const edgeGroups={};
  visT.forEach(t=>{
    const key=t.from+'|||'+t.to;
    if(!edgeGroups[key])edgeGroups[key]={from:t.from,to:t.to,syms:[]};
    edgeGroups[key].syms.push(t.sym);
  });

  Object.values(edgeGroups).forEach(eg=>{
    if(!pos[eg.from]||!pos[eg.to])return;
    const p1=pos[eg.from],p2=pos[eg.to];
    const hl=hlD.has(eg.from)||hlD.has(eg.to);
    const col=hl?'#00f5ff':'rgba(184,79,255,0.75)';
    const label=eg.syms.join(',');
    const isSelf=eg.from===eg.to;
    const reverseKey=eg.to+'|||'+eg.from;
    const hasBoth=!isSelf&&!!edgeGroups[reverseKey];
    const nr=vis.find(s=>s.id===eg.from);
    const nodeR=nr&&nr.id.length>6?18:R;
    drawArrow(Dc,p1[0],p1[1],p2[0],p2[1],label,col,hasBoth,isSelf,nodeR);
  });

  vis.forEach(s=>{
    if(!pos[s.id])return;
    const p=pos[s.id];
    const sm=s.id.length>6;
    drawNode(Dc,p[0],p[1],s.id,s.isStart,s.isAccept,hlD.has(s.id),sm);
  });
}

function render(){drawNFA();drawDFA();}

function sFwd(){if(cur<steps.length-1)applyStep(cur+1);else{stopPlay();doSuccess();}}
function sBack(){if(cur>0)applyStep(cur-1);}

function togPlay(){
  playing=!playing;
  const btn=document.getElementById('pbtn');
  btn.textContent=playing?'⏸ Pause':'▶ Play';
  btn.classList.toggle('on',playing);
  playing?startPlay():stopPlay();
}
function startPlay(){
  if(timer)clearInterval(timer);
  timer=setInterval(function(){
    if(cur>=steps.length-1){stopPlay();doSuccess();}else sFwd();
  },spdMs);
}
function stopPlay(){
  playing=false;
  const btn=document.getElementById('pbtn');
  btn.textContent='▶ Play';btn.classList.remove('on');
  if(timer){clearInterval(timer);timer=null;}
}
function setSpd(v){
  document.getElementById('sval').textContent=v+'x';
  spdMs=Math.round(1400/parseInt(v));
  if(playing){stopPlay();playing=true;startPlay();
    document.getElementById('pbtn').textContent='⏸ Pause';
    document.getElementById('pbtn').classList.add('on');}
}
function doReset(){
  stopPlay();cur=0;hlN=new Set();hlD=new Set();
  document.getElementById('snum').textContent='0';
  document.getElementById('loge').innerHTML='';
  document.getElementById('hint').textContent=mode==='beginner'?'Press ▶ Play or Step to begin conversion.':'';
  buildSteps();render();
}
function runAll(){
  if(!steps.length)return;
  for(var i=0;i<steps.length;i++)applyStep(i);
  doSuccess();
}
function togEps(){
  showEps=!showEps;
  document.getElementById('epsbtn').textContent='ε-closure '+(showEps?'ON':'OFF');
  render();
}
function setMode(m){
  mode=m;
  document.querySelectorAll('.pill').forEach(function(p){
    p.classList.toggle('on',p.textContent.toLowerCase()===m);
  });
  if(m==='advanced')document.getElementById('hint').textContent='';
}

function doSuccess(){showToast('★ Conversion complete!');spawnFx();}
function showToast(msg){
  document.getElementById('tmsg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}
function spawnFx(){
  var canvas=FD,ctx=Fd;
  var cols=['#00f5ff','#b84fff','#39ff14','#ffaa00','#ff0099'];
  var ps=[];
  for(var i=0;i<32;i++){
    ps.push({x:canvas.width*Math.random(),y:canvas.height*Math.random(),
      vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,
      r:Math.random()*3+1,col:cols[Math.floor(Math.random()*5)],life:1});
  }
  (function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ps=ps.filter(function(p){return p.life>0;});
    ps.forEach(function(p){
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.col;ctx.globalAlpha=p.life;ctx.fill();
      p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=.02;
    });
    ctx.globalAlpha=1;
    if(ps.length)requestAnimationFrame(frame);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

function loadEx(i){
  nfa=JSON.parse(JSON.stringify(EX[i]));
  doReset();
  addLog('Loaded: '+nfa.name,'i');
  addLog('States: {'+nfa.states.join(', ')+'} | Alphabet: {'+nfa.alpha.join(', ')+'}','i');
  addLog('Start: '+nfa.start+' | Accept: {'+nfa.accept.join(', ')+'}','i');
}

(function loop(){animT++;render();requestAnimationFrame(loop);})();
window.addEventListener('resize',resize);
window.addEventListener('load',function(){resize();loadEx(0);});
</script>
